services:
  # ─── FastAPI Backend ───────────────────────────────────────────
  - type: web
    name: fixxly-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fixxly-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false          # You paste this manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false          # You paste this manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random key
      - key: DEBUG
        value: false
    healthCheckPath: /health

  # ─── Next.js Frontend ─────────────────────────────────────────
  - type: web
    name: fixxly-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: fixxly-api
          type: web
          property: host
          # Render auto-fills the backend URL here

# ─── PostgreSQL Database ────────────────────────────────────────
databases:
  - name: fixxly-db
    plan: free
    databaseName: fixxly
    user: fixxly_user
